name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_USER: postgres
  DB_PASS: 123456
  DB_NAME: paymate
  DB_HOST: db
  DB_PORT: 5432

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.18.3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  migrations:
    runs-on: ubuntu-latest
    needs: setup
    env:
      DB_USER: postgres
      DB_PASS: 123456
      DB_NAME: paymate
      DB_HOST: db
      DB_PORT: 5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.18.3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start Docker Compose services
        run: docker-compose up -d

      - name: Wait for database to be ready
        run: |
          for i in $(seq 1 30); do
            docker-compose exec -T db pg_isready -U postgres && break
            echo "Waiting for database..."
            sleep 1
          done

      - name: Run migrations
        run: npx typeorm migration:run -d dist/data-source.js

  test:
    runs-on: ubuntu-latest
    needs: migrations
    env:
      DB_USER: postgres
      DB_PASS: 123456
      DB_NAME: paymate
      DB_HOST: db
      DB_PORT: 5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.18.3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start Docker Compose services
        run: docker-compose up -d

      - name: Wait for database to be ready
        run: |
          for i in $(seq 1 30); do
            docker-compose exec -T db pg_isready -U postgres && break
            echo "Waiting for database..."
            sleep 1
          done

      - name: Run tests
        run: npm run test
