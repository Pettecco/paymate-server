services:
  db:
    image: postgres:15
    container_name: paymate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - paymate_data:/var/lib/postgresql/data

volumes:
  paymate_data:
